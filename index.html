<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIRIMATH AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #080808;
  --white: #f0ece4;
  --gray: #1a1a1a;
  --mid: #2e2e2e;
  --border: rgba(240,236,228,0.12);
  --accent: #c8b89a;
  --dim: #666;
  --gold: #d4a853;
}

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Crimson Pro', serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  cursor: default;
}

/* Subtle noise texture */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
}

/* === HEADER === */
header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(8,8,8,0.95);
  backdrop-filter: blur(20px);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

/* Yin-Yang SVG logo */
.yinyang {
  width: 42px;
  height: 42px;
  animation: slowSpin 20s linear infinite;
  flex-shrink: 0;
  filter: drop-shadow(0 0 8px rgba(240,236,228,0.3));
}

@keyframes slowSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.brand {
  display: flex;
  flex-direction: column;
}

.brand-name {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 6px;
  color: var(--white);
  line-height: 1;
}

.brand-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--dim);
  margin-top: 3px;
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 16px;
}

.caps-row {
  display: flex;
  gap: 6px;
}

.cap {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 2px;
  border: 1px solid;
  transition: all 0.3s;
}

.cap-search { border-color: #888; color: #888; }
.cap-image  { border-color: #888; color: #888; }
.cap-file   { border-color: #888; color: #888; }
.cap-mem    { border-color: #888; color: #888; }
.cap.on     { border-color: var(--accent); color: var(--accent); }

.online-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #a0c878;
  box-shadow: 0 0 6px #a0c878;
  animation: breathe 3s ease-in-out infinite;
}

@keyframes breathe {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* === MESSAGES === */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); }

/* === WELCOME === */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  text-align: center;
  gap: 20px;
  padding: 20px;
  animation: fadeUp 0.8s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.welcome-logo {
  width: 90px; height: 90px;
  animation: slowSpin 25s linear infinite;
  opacity: 0.85;
  filter: drop-shadow(0 0 20px rgba(240,236,228,0.2));
}

.welcome-title {
  font-family: 'Cinzel', serif;
  font-size: 32px;
  font-weight: 900;
  letter-spacing: 10px;
  color: var(--white);
}

.welcome-tagline {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 16px;
  color: var(--dim);
  letter-spacing: 1px;
}

.welcome-divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.suggestions {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  width: 100%;
  max-width: 520px;
}

.sug-btn {
  background: var(--gray);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 16px;
  color: var(--accent);
  font-family: 'Crimson Pro', serif;
  font-size: 13px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  line-height: 1.4;
}

.sug-btn:hover {
  background: var(--mid);
  border-color: var(--accent);
  transform: translateY(-1px);
}

.sug-icon { font-size: 16px; display: block; margin-bottom: 4px; }

/* === MESSAGE BUBBLES === */
.msg {
  display: flex;
  gap: 14px;
  animation: fadeUp 0.3s ease both;
  max-width: 100%;
}

.msg.user-msg { flex-direction: row-reverse; }

.avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

.avatar.ai-av {
  background: var(--gray);
  border: 1px solid var(--border);
}

.avatar.ai-av svg {
  width: 20px; height: 20px;
  animation: slowSpin 15s linear infinite;
}

.avatar.user-av {
  background: var(--mid);
  border: 1px solid var(--border);
  font-size: 14px;
  color: var(--accent);
  font-family: 'Cinzel', serif;
  font-weight: 700;
}

.msg-content { max-width: 75%; display: flex; flex-direction: column; gap: 4px; }
.msg.user-msg .msg-content { align-items: flex-end; }

.msg-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--dim);
}

.bubble {
  padding: 12px 16px;
  border-radius: 4px;
  font-size: 15px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}

.ai-bubble {
  background: var(--gray);
  border: 1px solid var(--border);
  color: var(--white);
  border-top-left-radius: 0;
}

.user-bubble {
  background: rgba(200,184,154,0.1);
  border: 1px solid rgba(200,184,154,0.2);
  color: var(--white);
  border-top-right-radius: 0;
}

.msg-img { max-width: 220px; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 6px; display: block; }

/* THINKING */
.thinking-wrap { display: flex; gap: 12px; align-items: center; animation: fadeUp 0.3s ease both; }
.thinking-wrap .avatar { width: 34px; height: 34px; }

.thinking-dots {
  display: flex; gap: 5px; align-items: center;
  background: var(--gray);
  border: 1px solid var(--border);
  padding: 12px 16px;
  border-radius: 4px;
  border-top-left-radius: 0;
}

.thinking-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  animation: dotBounce 1.3s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.15s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.3s; }

@keyframes dotBounce {
  0%,80%,100% { transform: scale(0.6); opacity: 0.3; }
  40%          { transform: scale(1);   opacity: 1; }
}

/* === INPUT AREA === */
.input-section {
  border-top: 1px solid var(--border);
  background: rgba(8,8,8,0.98);
  padding: 14px 24px 18px;
  flex-shrink: 0;
}

/* Attachments */
#attachments-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.att-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--gray);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 4px 10px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  max-width: 200px;
}

.att-chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.att-chip button {
  background: none; border: none; color: var(--dim);
  cursor: pointer; font-size: 14px; line-height: 1; padding: 0; flex-shrink: 0;
}
.att-chip button:hover { color: #ff4455; }

/* Toolbar */
.toolbar {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.t-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--gray);
  color: var(--dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
}

.t-btn:hover, .t-btn.active {
  border-color: var(--accent);
  color: var(--accent);
}

.t-btn.active { background: rgba(200,184,154,0.08); }

/* Input row */
.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

#user-input {
  flex: 1;
  background: var(--gray);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 16px;
  color: var(--white);
  font-family: 'Crimson Pro', serif;
  font-size: 16px;
  resize: none;
  min-height: 48px;
  max-height: 130px;
  outline: none;
  transition: border-color 0.2s;
  scrollbar-width: none;
  line-height: 1.5;
}

#user-input:focus { border-color: var(--accent); }
#user-input::placeholder { color: var(--dim); font-style: italic; }

#send-btn {
  width: 48px; height: 48px;
  border-radius: 4px;
  background: var(--white);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

#send-btn:hover { background: var(--accent); transform: scale(1.04); }
#send-btn:active { transform: scale(0.96); }
#send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

#send-btn svg { width: 20px; height: 20px; }

/* Hidden file inputs */
#img-input, #file-input { display: none; }

/* Clear history btn */
.clear-btn {
  margin-left: auto;
  background: none;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 5px 10px;
  color: var(--dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
}
.clear-btn:hover { border-color: #ff4455; color: #ff4455; }

/* Source tag */
.source-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--dim);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 2px 6px;
  display: inline-block;
  margin-top: 6px;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<!-- HIDDEN INPUTS -->
<input type="file" id="img-input" accept="image/*">
<input type="file" id="file-input" accept=".pdf,.txt,.md,.csv,.json,.doc,.docx">

<!-- HEADER -->
<header>
  <!-- Yin-Yang Logo -->
  <svg class="yinyang" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="48" fill="white" stroke="#111" stroke-width="2"/>
    <path d="M50,2 A48,48 0 0,1 50,98 A24,24 0 0,1 50,50 A24,24 0 0,0 50,2Z" fill="#111"/>
    <circle cx="50" cy="26" r="12" fill="#111"/>
    <circle cx="50" cy="74" r="12" fill="white"/>
    <circle cx="50" cy="26" r="4" fill="white"/>
    <circle cx="50" cy="74" r="4" fill="#111"/>
  </svg>

  <div class="brand">
    <div class="brand-name">SIRIMATH AI</div>
    <div class="brand-sub">UNIVERSAL INTELLIGENCE SYSTEM</div>
  </div>

  <div class="header-right">
    <div class="caps-row">
      <div class="cap cap-search" id="cap-web">WEB</div>
      <div class="cap cap-image" id="cap-img">IMG</div>
      <div class="cap cap-file"  id="cap-file">FILE</div>
      <div class="cap cap-mem"   id="cap-mem">MEM</div>
    </div>
    <div class="online-dot"></div>
  </div>
</header>

<!-- MESSAGES -->
<div id="messages">
  <div class="welcome" id="welcome">
    <svg class="welcome-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="white" stroke="#333" stroke-width="2"/>
      <path d="M50,2 A48,48 0 0,1 50,98 A24,24 0 0,1 50,50 A24,24 0 0,0 50,2Z" fill="#111"/>
      <circle cx="50" cy="26" r="12" fill="#111"/>
      <circle cx="50" cy="74" r="12" fill="white"/>
      <circle cx="50" cy="26" r="4" fill="white"/>
      <circle cx="50" cy="74" r="4" fill="#111"/>
    </svg>
    <div class="welcome-title">SIRIMATH AI</div>
    <div class="welcome-divider"></div>
    <div class="welcome-tagline">ඕනෑම දෙයක් දැනගන්න · ඕනෑම දෙයක් කරන්න</div>
    <div class="suggestions">
      <button class="sug-btn" onclick="fillInput('අද ලෝකේ ප්‍රධාන ප්‍රවෘත්ති මොනවාද?')">
        <span class="sug-icon">🌐</span>Internet search කරලා ප්‍රවෘත්ති දෙන්න
      </button>
      <button class="sug-btn" onclick="fillInput('මේ image එකේ තියෙන්නේ මොකක්ද? විස්තරාත්මකව කියන්න')">
        <span class="sug-icon">🖼️</span>Image analyze කරන්න
      </button>
      <button class="sug-btn" onclick="fillInput('Python code එකක් ලියන්න — fibonacci sequence print කරන')">
        <span class="sug-icon">💻</span>Code ලියන්න
      </button>
      <button class="sug-btn" onclick="fillInput('Quantum computing කියන්නේ මොකක්ද? සරලව explain කරන්න')">
        <span class="sug-icon">🧠</span>ඕනෑම දෙයක් explain කරන්න
      </button>
    </div>
  </div>
</div>

<!-- INPUT AREA -->
<div class="input-section">
  <div id="attachments-row"></div>

  <div class="toolbar">
    <button class="t-btn" id="btn-web" onclick="toggleWeb()">🌐 WEB SEARCH</button>
    <button class="t-btn" onclick="document.getElementById('img-input').click()">🖼️ IMAGE</button>
    <button class="t-btn" onclick="document.getElementById('file-input').click()">📄 FILE</button>
    <button class="t-btn" id="btn-mem" onclick="toggleMem()">🧠 MEMORY</button>
    <button class="t-btn" onclick="clearHistory()">🗑 CLEAR</button>
  </div>

  <div class="input-row">
    <textarea id="user-input" placeholder="ඔබේ ප්‍රශ්නය ඇතුළු කරන්න..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
// ===================== STATE =====================
let chatHistory = [];
let pendingImages = [];   // {base64, mime, name, el}
let pendingFiles  = [];   // {text, name, el}
let useWeb = false;
let useMem = true;

// ===================== CAPS HIGHLIGHT =====================
function updateCaps() {
  document.getElementById('cap-web').classList.toggle('on', useWeb);
  document.getElementById('cap-img').classList.toggle('on', pendingImages.length > 0);
  document.getElementById('cap-file').classList.toggle('on', pendingFiles.length > 0);
  document.getElementById('cap-mem').classList.toggle('on', useMem);
}

function toggleWeb() {
  useWeb = !useWeb;
  document.getElementById('btn-web').classList.toggle('active', useWeb);
  updateCaps();
}

function toggleMem() {
  useMem = !useMem;
  document.getElementById('btn-mem').classList.toggle('active', useMem);
  updateCaps();
}

// ===================== FILE HANDLERS =====================
document.getElementById('img-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const base64 = await toBase64(file);
  const mime   = file.type;
  const name   = file.name;
  const chip   = addAttachmentChip('🖼️ ' + name, () => {
    pendingImages = pendingImages.filter(i => i.name !== name);
    updateCaps();
  });
  pendingImages.push({ base64, mime, name });
  updateCaps();
  e.target.value = '';
});

document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  const name = file.name;
  const chip = addAttachmentChip('📄 ' + name, () => {
    pendingFiles = pendingFiles.filter(f => f.name !== name);
    updateCaps();
  });
  pendingFiles.push({ text, name });
  updateCaps();
  e.target.value = '';
});

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Read error'));
    r.readAsDataURL(file);
  });
}

function addAttachmentChip(label, onRemove) {
  const row  = document.getElementById('attachments-row');
  const chip = document.createElement('div');
  chip.className = 'att-chip';
  chip.innerHTML = `<span>${label}</span><button onclick="this.parentElement.remove(); (${onRemove.toString()})()">×</button>`;
  row.appendChild(chip);
  return chip;
}

// ===================== TEXTAREA AUTO-RESIZE =====================
const ta = document.getElementById('user-input');
ta.addEventListener('input', () => {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 130) + 'px';
});

ta.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ===================== SUGGESTIONS =====================
function fillInput(text) { ta.value = text; ta.focus(); }

// ===================== SEND MESSAGE =====================
async function sendMessage() {
  const text = ta.value.trim();
  if (!text && pendingImages.length === 0 && pendingFiles.length === 0) return;

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Build user bubble content
  const userContent = [];
  const imgs = [...pendingImages];
  const files = [...pendingFiles];

  // Show user message
  const userBubble = addMessage('user', text, imgs);

  // Clear input
  ta.value = '';
  ta.style.height = 'auto';
  pendingImages = [];
  pendingFiles  = [];
  document.getElementById('attachments-row').innerHTML = '';
  updateCaps();

  // Build API message
  const msgContent = [];

  // Add images
  imgs.forEach(img => {
    msgContent.push({ type: 'image', source: { type: 'base64', media_type: img.mime, data: img.base64 } });
  });

  // Add file contents
  files.forEach(f => {
    msgContent.push({ type: 'text', text: `[File: ${f.name}]\n${f.text}` });
  });

  // Add user text
  if (text) msgContent.push({ type: 'text', text });

  // Add to history
  chatHistory.push({ role: 'user', content: msgContent });

  // Show thinking
  const thinkEl = showThinking();
  document.getElementById('send-btn').disabled = true;

  try {
    const systemPrompt = buildSystemPrompt();
    const messages     = useMem ? chatHistory : [chatHistory[chatHistory.length - 1]];

    const tools = useWeb ? [{
      type: 'web_search_20250305',
      name: 'web_search'
    }] : undefined;

    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      system: systemPrompt,
      messages: messages,
    };

    if (tools) body.tools = tools;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await resp.json();

    thinkEl.remove();
    document.getElementById('send-btn').disabled = false;

    // Extract reply text
    let replyText = '';
    let usedWeb   = false;

    if (data.content && Array.isArray(data.content)) {
      data.content.forEach(block => {
        if (block.type === 'text')       replyText += block.text;
        if (block.type === 'tool_use' && block.name === 'web_search') usedWeb = true;
      });
    }

    if (!replyText) replyText = 'සමාවෙන්න, පිළිතුරක් ලබාගැනීමට නොහැකි විය.';

    addMessage('ai', replyText, [], usedWeb);

    // Add AI response to history
    chatHistory.push({ role: 'assistant', content: replyText });

  } catch (err) {
    thinkEl.remove();
    document.getElementById('send-btn').disabled = false;
    addMessage('ai', '⚠️ Error: ' + err.message);
    chatHistory.pop();
  }
}

// ===================== ADD MESSAGE =====================
function addMessage(role, text, images = [], webUsed = false) {
  const msgs  = document.getElementById('messages');
  const wrap  = document.createElement('div');
  wrap.className = `msg ${role === 'user' ? 'user-msg' : ''}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role === 'ai' ? 'ai-av' : 'user-av'}`;

  if (role === 'ai') {
    avatar.innerHTML = `
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" fill="white" stroke="#333" stroke-width="3"/>
        <path d="M50,2 A48,48 0 0,1 50,98 A24,24 0 0,1 50,50 A24,24 0 0,0 50,2Z" fill="#111"/>
        <circle cx="50" cy="26" r="12" fill="#111"/>
        <circle cx="50" cy="74" r="12" fill="white"/>
        <circle cx="50" cy="26" r="4" fill="white"/>
        <circle cx="50" cy="74" r="4" fill="#111"/>
      </svg>`;
  } else {
    avatar.textContent = 'U';
  }

  const content = document.createElement('div');
  content.className = 'msg-content';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'ai' ? 'SIRIMATH AI' : 'YOU';

  const bubbleWrap = document.createElement('div');

  // Images
  if (images && images.length > 0) {
    images.forEach(img => {
      const im = document.createElement('img');
      im.className = 'msg-img';
      im.src = `data:${img.mime};base64,${img.base64}`;
      bubbleWrap.appendChild(im);
    });
  }

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role === 'ai' ? 'ai-bubble' : 'user-bubble'}`;
  bubble.innerHTML = formatText(text);

  bubbleWrap.appendChild(bubble);

  if (webUsed) {
    const tag = document.createElement('div');
    tag.className = 'source-tag';
    tag.textContent = '🌐 WEB SEARCH USED';
    bubbleWrap.appendChild(tag);
  }

  content.appendChild(label);
  content.appendChild(bubbleWrap);

  wrap.appendChild(avatar);
  wrap.appendChild(content);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;

  return wrap;
}

// ===================== FORMAT TEXT =====================
function formatText(text) {
  if (!text) return '';
  // Escape HTML
  let t = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Code blocks
  t = t.replace(/```(\w+)?\n([\s\S]*?)```/g, (m, lang, code) =>
    `<pre style="background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:12px;overflow-x:auto;font-family:'Share Tech Mono',monospace;font-size:12px;color:#c8e8ff;margin:8px 0;line-height:1.5">${code.trim()}</pre>`);
  // Inline code
  t = t.replace(/`([^`]+)`/g, '<code style="background:#222;padding:1px 5px;border-radius:2px;font-family:\'Share Tech Mono\',monospace;font-size:12px;color:#c8b89a">$1</code>');
  // Bold
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#f0ece4;font-weight:700">$1</strong>');
  // Italic
  t = t.replace(/\*(.*?)\*/g, '<em>$1</em>');
  // Headings
  t = t.replace(/^### (.+)$/gm, '<div style="font-family:\'Cinzel\',serif;font-size:14px;font-weight:700;color:#c8b89a;margin:12px 0 6px;letter-spacing:1px">$1</div>');
  t = t.replace(/^## (.+)$/gm,  '<div style="font-family:\'Cinzel\',serif;font-size:16px;font-weight:700;color:#d4c0a0;margin:14px 0 6px;letter-spacing:1px">$1</div>');
  t = t.replace(/^# (.+)$/gm,   '<div style="font-family:\'Cinzel\',serif;font-size:18px;font-weight:900;color:#f0ece4;margin:16px 0 8px;letter-spacing:2px">$1</div>');
  // Lists
  t = t.replace(/^[\-\*] (.+)$/gm, '<div style="padding-left:16px;margin:3px 0">• $1</div>');
  t = t.replace(/^\d+\. (.+)$/gm, (m, item, offset, str) => `<div style="padding-left:16px;margin:3px 0">${m}</div>`);
  // Newlines
  t = t.replace(/\n/g, '<br>');
  return t;
}
